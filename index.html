<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Santos Romero" />
  <meta name="title" content="Tarjeta de perfil" />
  <meta name="description" content="Tarjeta de presentacion personal" />
  <!-- Boxicons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <!-- Normalize -->
  <link rel="stylesheet" href="css/normalize.css" />
  <!-- Estilos -->
  <link rel="stylesheet" href="css/style.css" />
  <!-- Favicon -->
  <link rel="shortcut icon" href="./images/favicon-32x32.png" type="image/x-icon" />
  <title>Profile Card - Frontend Club</title>
</head>

<body>
  <main class="container dflex">
    <div class="card">
      <div class="card__main">
        <img src="images/avatar.png" alt="Avatar" />
        <h2>Santos Romero</h2>
        <span>Medellín, Colombia</span>
        <p>
          Mejora tus habilidades de codificación construyendo proyectos geniales.
        </p>
      </div>
      <div class="card__footer dflex">
        <i class='bx bxl-twitter'></i>
        <i class='bx bxl-linkedin-square'></i>
        <i class='bx bxl-facebook'></i>
      </div>
    </div>
  </main>
</body>

</html>
